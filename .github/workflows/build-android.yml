name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 允许在 GitHub 网页上手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装 npm 依赖
        working-directory: app
        run: npm ci

      - name: 构建 Web 资源
        working-directory: app
        run: npm run build

      - name: 添加 Capacitor Android 平台
        working-directory: app
        run: npx cap add android

      - name: 同步 Web 资源到 Android
        working-directory: app
        run: npx cap sync android

      - name: 给 Gradle 添加执行权限
        working-directory: app/android
        run: chmod +x gradlew

      - name: 配置 Gradle 内存（防止 OOM）
        working-directory: app/android
        run: |
          echo "org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties
          echo "org.gradle.parallel=false" >> gradle.properties
          echo "org.gradle.caching=false" >> gradle.properties

      - name: 构建 Debug APK
        working-directory: app/android
        run: ./gradlew assembleDebug --no-daemon --max-workers 2 --stacktrace

      - name: 上传 APK 到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qiandao-debug-apk
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # 保留30天
