workflows:
  android-debug:
    名字: 签到管理
    max_build_duration: 30
    environment:
      node: 22.15.0
      java: 17
    scripts:
      - 名字: 安装 npm 依赖
        script: |
          cd app
          npm ci

      - 名字: 构建 Web 资源
        script: |
          cd app
          npm run build

      - 名字: 添加 Capacitor Android 平台
        script: |
          cd app
          npx cap add android

      - 名字: 同步 Web 资源到 Android
        script: |
          cd app
          npx cap sync android

      - 名字: 构建 APK
        script: |
          cd app/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - app/android/app/build/outputs/apk/debug/app-debug.apk

    publishing:
      电子邮箱:
        recipients:
          -231589322@qq.com        # ← 改成你的邮箱，构建完成后发送下载链接
        notify:
          success: true
          failure: true
